# Deploy all presentations to GitHub Pages
#
# REQUIRED (one-time): Enable Pages before the first run:
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# If you skip this, the "Setup Pages" step will fail with "Get Pages site failed".
#
# Site structure (each course in its own folder):
#   /rules/                  → Rules presentation
#   /commands_n_skills/      → Commands & Skills presentation
#   /hooks/                  → Hooks presentation
#   /spec_driven/            → Spec-Driven AI Coding presentation
#   /mcp/                    → MCP (Model Context Protocol) presentation
#   /subagents/              → Sous-agents (délégation) presentation
#   /model_arena/            → Choisir un modèle (OpenAI & Anthropic)
#
# Live URLs:
#   https://davidthibaulttlm.github.io/Formations/rules
#   https://davidthibaulttlm.github.io/Formations/commands_n_skills
#   https://davidthibaulttlm.github.io/Formations/hooks
#   https://davidthibaulttlm.github.io/Formations/spec_driven
#   https://davidthibaulttlm.github.io/Formations/mcp
#   https://davidthibaulttlm.github.io/Formations/subagents
#   https://davidthibaulttlm.github.io/Formations/model_arena

name: Deploy presentations to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'rules/presentation/**'
      - 'commands_n_skills/presentation/**'
      - 'hooks/presentation/**'
      - 'spec_driven/presentation/**'
      - 'mcp/presentation/**'
      - 'subagents/presentation/**'
      - 'model_arena/presentation/**'
      - '.github/workflows/deploy-presentation.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ format('github-{0}', 'pages') }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build combined site
        run: |
          mkdir -p _site/rules _site/commands_n_skills _site/hooks _site/spec_driven _site/mcp _site/subagents _site/model_arena
          cp rules/presentation/* _site/rules/
          cp commands_n_skills/presentation/* _site/commands_n_skills/
          cp hooks/presentation/* _site/hooks/
          cp spec_driven/presentation/* _site/spec_driven/
          cp mcp/presentation/* _site/mcp/
          cp subagents/presentation/* _site/subagents/
          cp model_arena/presentation/* _site/model_arena/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show site URLs
        run: |
          echo "::notice title=Site live::All presentations deployed"
          echo "👉 Rules:              ${{ steps.deployment.outputs.page_url }}rules/"
          echo "👉 Commands & Skills:  ${{ steps.deployment.outputs.page_url }}commands_n_skills/"
          echo "👉 Hooks:              ${{ steps.deployment.outputs.page_url }}hooks/"
          echo "👉 Spec-Driven:        ${{ steps.deployment.outputs.page_url }}spec_driven/"
          echo "👉 MCP:                ${{ steps.deployment.outputs.page_url }}mcp/"
          echo "👉 Sous-agents:        ${{ steps.deployment.outputs.page_url }}subagents/"
          echo "👉 Modèles (OAI+Anthro): ${{ steps.deployment.outputs.page_url }}model_arena/"
