# Deploy the Rules presentation to GitHub Pages
#
# REQUIRED (one-time): Enable Pages before the first run:
#   Repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# If you skip this, the "Setup Pages" step will fail with "Get Pages site failed".

name: Deploy presentation to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'rules/presentation/**'
      - '.github/workflows/deploy-presentation.yml'
  workflow_dispatch:  # Allow manual run from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ format('github-{0}', 'pages') }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Requires: Settings → Pages → Source = "GitHub Actions" (one-time)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Path to the folder containing index.html (contents become site root)
          # If repo root is "Formations", use: rules/presentation
          # If repo has a Formations/ subfolder, use: Formations/rules/presentation
          path: 'rules/presentation'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show site URL
        run: |
          echo "::notice title=Presentation live ::Your presentation is at the ROOT of the site, not under /rules/presentation"
          echo "👉 Open: ${{ steps.deployment.outputs.page_url }}"
          echo "❌ Wrong (404): ${{ steps.deployment.outputs.page_url }}rules/presentation"
